<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>施老师大课堂 · ShiClass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="data/course-catalog.js"></script>
<style>
:root {
  --bg: #F7F4EE;
  --card-bg: #FFFFFF;
  --text: #1A1A2E;
  --text-secondary: #5A5A7A;
  --accent: #CC785C;
  --accent-light: #E8A88C;
  --border: #E8E4DC;
  --radius: 16px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
}
.page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 24px;
}

/* Header */
.site-header {
  padding: 60px 0 40px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  margin-bottom: 48px;
}
.site-header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 2.5rem;
  font-weight: 900;
  color: var(--text);
  margin-bottom: 12px;
}
.site-header .subtitle {
  font-size: 1.1rem;
  color: var(--text-secondary);
  max-width: 600px;
  margin: 0 auto;
}
.site-header .meta {
  margin-top: 16px;
  font-size: 0.9rem;
  color: var(--text-secondary);
}
.site-header .meta span {
  display: inline-block;
  margin: 0 8px;
  padding: 4px 12px;
  background: var(--accent);
  color: white;
  border-radius: 20px;
  font-size: 0.8rem;
}

/* Groups */
.group-section {
  margin-bottom: 48px;
}
.group-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--accent);
}
.group-header h2 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.6rem;
  font-weight: 700;
}
.group-header .group-desc {
  color: var(--text-secondary);
  font-size: 0.9rem;
}
.group-header .group-meta {
  margin-left: auto;
  display: flex;
  gap: 8px;
}
.group-header .group-meta span {
  font-size: 0.75rem;
  padding: 2px 10px;
  background: var(--border);
  border-radius: 12px;
  color: var(--text-secondary);
}

/* Collection Cards */
.collection-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}
.collection-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: block;
}
.collection-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}
.collection-card .kind-tag {
  font-size: 0.75rem;
  padding: 3px 10px;
  background: var(--accent);
  color: white;
  border-radius: 12px;
  display: inline-block;
  margin-bottom: 12px;
}
.collection-card h3 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 6px;
}
.collection-card .subtitle {
  color: var(--accent);
  font-size: 0.85rem;
  margin-bottom: 10px;
  font-weight: 500;
}
.collection-card .description {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 14px;
}
.collection-card .meta-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.collection-card .meta-row span {
  font-size: 0.75rem;
  padding: 2px 10px;
  background: var(--bg);
  border-radius: 10px;
  color: var(--text-secondary);
}

/* Footer */
.site-footer {
  margin-top: 60px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.85rem;
}

/* Responsive */
@media (max-width: 640px) {
  .site-header h1 { font-size: 1.8rem; }
  .collection-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="page">
  <header class="site-header">
    <h1>📖 施老师大课堂</h1>
    <p class="subtitle">施凌老师研讨会系列 · 从 Kalman Filter 到具身智能，系统化的学术与技能课程</p>
    <div class="meta">
      <span>🎯 KF 系列</span>
      <span>🎤 演讲技巧</span>
      <span>🤖 具身智能</span>
    </div>
  </header>

  <main id="mainContent">
    <!-- groups rendered by JS -->
  </main>

  <footer class="site-footer">
    <p>ShiClass · 施老师大课堂 · Powered by Hermes Agent</p>
    <p style="margin-top:4px;font-size:0.8rem;">视频与板书 PDF 来源：江南大学云盘 · 每周三更新</p>
  </footer>
</div>

<script>
(function() {
  const data = window.SHICLASS_DATA || { groups: [], collections: [] };
  const main = document.getElementById('mainContent');

  function render() {
    let html = '';
    for (const group of data.groups) {
      html += `<section class="group-section">
        <div class="group-header">
          <h2>${group.emoji || '📚'} ${group.title}</h2>
          <span class="group-desc">${group.description}</span>
          <div class="group-meta">${(group.meta||[]).map(m => `<span>${m}</span>`).join('')}</div>
        </div>
        <div class="collection-grid">`;

      const cols = data.collections.filter(c => c.groupId === group.id);
      for (const col of cols) {
        html += `<a class="collection-card" href="${col.quickOpen || '#'}">
          <div class="kind-tag">${col.kind}</div>
          <h3>${col.title}</h3>
          <div class="subtitle">${col.subtitle || ''}</div>
          <p class="description">${col.description}</p>
          <div class="meta-row">${(col.meta||[]).map(m => `<span>${m}</span>`).join('')}</div>
        </a>`;
      }

      html += `</div></section>`;
    }
    main.innerHTML = html;
  }

  render();
})();
</script>
</body>
</html>
