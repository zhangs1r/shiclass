<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>施老师大课堂 · ShiClass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="data/course-catalog.js"></script>
<style>
:root {
  --bg: #F7F4EE;
  --card-bg: #FFFFFF;
  --text: #1A1A2E;
  --text-secondary: #5A5A7A;
  --accent: #CC785C;
  --accent-light: #E8A88C;
  --accent-subtle: #F5E6DE;
  --border: #E8E4DC;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
}
.page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 24px;
}

/* Header */
.site-header {
  padding: 60px 0 40px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  margin-bottom: 48px;
}
.site-header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 2.5rem;
  font-weight: 900;
  color: var(--text);
  margin-bottom: 12px;
}
.site-header .subtitle {
  font-size: 1.05rem;
  color: var(--text-secondary);
  max-width: 640px;
  margin: 0 auto;
}
.site-header .meta {
  margin-top: 16px;
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}
.site-header .meta span {
  padding: 4px 14px;
  background: var(--accent);
  color: white;
  border-radius: 20px;
  font-size: 0.8rem;
}

/* Collection Section */
.collection-section {
  margin-bottom: 56px;
}
.collection-header {
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--accent);
}
.collection-header h2 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.collection-header .col-desc {
  font-size: 0.85rem;
  color: var(--text-secondary);
}
.collection-header .col-meta {
  margin-top: 6px;
  display: flex;
  gap: 8px;
}
.collection-header .col-meta span {
  font-size: 0.75rem;
  padding: 2px 10px;
  background: var(--border);
  border-radius: 12px;
  color: var(--text-secondary);
}

/* Lesson Card Grid */
.lesson-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}
.lesson-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.15s, box-shadow 0.15s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.lesson-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  border-color: var(--accent-light);
}
.lesson-card .lesson-title {
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.4;
}
.lesson-card .lesson-subtitle {
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.4;
  flex: 1;
}
.lesson-card .lesson-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
  margin-top: 4px;
}
.lesson-card .lesson-meta .dur {
  font-size: 0.72rem;
  color: var(--accent);
  font-weight: 500;
}
.lesson-card .lesson-meta .tag {
  font-size: 0.7rem;
  padding: 1px 8px;
  background: var(--accent-subtle);
  border-radius: 8px;
  color: var(--text-secondary);
}

/* Footer */
.site-footer {
  margin-top: 60px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.85rem;
}

.workspace-topbar { font-size: 0.7rem; padding: 4px 16px; }

.workspace-topbar {
  background: rgba(204, 120, 92, 0.08);
  border-bottom: 1px solid var(--border);
  padding: 6px 24px;
  font-size: 0.8rem;
  text-align: center;
}
.workspace-topbar a {
  color: var(--accent);
  font-weight: 600;
  text-decoration: none;
}
.workspace-topbar a:hover { text-decoration: underline; color: var(--accent); }
.workspace-topbar .sep {
  color: var(--text-secondary);
  margin: 0 8px;
}
.workspace-topbar .current {
  color: var(--text-secondary);
}

@media (max-width: 640px) {
  .site-header h1 { font-size: 1.8rem; }
  .lesson-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="workspace-topbar">
  <a href="https://zhangs1r.github.io/lessonworkspace/">📚 LessonWorkspace</a>
  <span class="sep">/</span>
  <span class="current">ShiClass</span>
</div>

<div class="page">
  <header class="site-header">
    <h1>📖 施老师大课堂</h1>
    <p class="subtitle">施凌老师研讨会系列 · 30 节课程，从 Kalman Filter 理论到具身智能应用</p>
    <div class="meta">
      <span>🎯 30 节课程</span>
      <span>🎤 KF 系列</span>
      <span>🤖 特邀分享</span>
    </div>
  </header>

  <main id="mainContent">
    <!-- rendered by JS -->
  </main>

  <footer class="site-footer">
    <p>ShiClass · 施老师大课堂 · 视频/板书来源：江南大学云盘</p>
    <p style="margin-top:4px;font-size:0.8rem;">Powered by Hermes Agent · 每周三更新</p>
  </footer>
</div>

<script>
(function() {
  const data = window.SHICLASS_DATA || { collections: [], lessons: [] };
  const main = document.getElementById('mainContent');

  function render() {
    let html = '';

    // Group lessons by their collectionId
    const grouped = {};
    for (const lesson of data.lessons) {
      const cid = lesson.collectionId || 'uncategorized';
      if (!grouped[cid]) grouped[cid] = [];
      grouped[cid].push(lesson);
    }

    // Get ordered collections list (preserve catalog order)
    const orderedCollections = data.collections || [];

    for (const col of orderedCollections) {
      const lessons = grouped[col.id] || [];
      if (lessons.length === 0) continue;

      html += `<section class="collection-section">
        <div class="collection-header">
          <h2>${col.kind || '课程'}：${col.title}</h2>
          <div class="col-desc">${col.description || ''}</div>
          <div class="col-meta">${(col.meta||[]).map(m => `<span>${m}</span>`).join('')}</div>
        </div>
        <div class="lesson-grid">`;

      for (const lesson of lessons) {
        const tags = lesson.tags || [];
        html += `<a class="lesson-card" href="${lesson.path || '#'}">
          <div class="lesson-title">${lesson.title || ''}</div>
          <div class="lesson-subtitle">${lesson.subtitle || ''}</div>
          <div class="lesson-meta">
            <span class="dur">${lesson.duration || ''}</span>
            ${tags.slice(0,3).map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
        </a>`;
      }

      html += `</div></section>`;
    }

    main.innerHTML = html;
  }

  render();
})();
</script>
</body>
</html>
