<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>施老师大课堂 · ShiClass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="data/course-catalog.js"></script>
<style>
:root {
  --bg: #F7F4EE;
  --card-bg: #FFFFFF;
  --text: #1A1A2E;
  --text-secondary: #5A5A7A;
  --accent: #CC785C;
  --accent-light: #E8A88C;
  --accent-subtle: #F5E6DE;
  --border: #E8E4DC;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
}
.page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 24px;
}

/* Header */
.site-header {
  padding: 60px 0 40px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  margin-bottom: 48px;
}
.site-header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 2.5rem;
  font-weight: 900;
  color: var(--text);
  margin-bottom: 12px;
}
.site-header .subtitle {
  font-size: 1.05rem;
  color: var(--text-secondary);
  max-width: 640px;
  margin: 0 auto;
}
.site-header .meta {
  margin-top: 16px;
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}
.site-header .meta span {
  padding: 4px 14px;
  background: var(--accent);
  color: white;
  border-radius: 20px;
  font-size: 0.8rem;
}

/* Collection Section */
.collection-section {
  margin-bottom: 56px;
}
.collection-header {
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--accent);
}
.collection-header h2 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.collection-header .col-desc {
  font-size: 0.85rem;
  color: var(--text-secondary);
}
.collection-header .col-meta {
  margin-top: 6px;
  display: flex;
  gap: 8px;
}
.collection-header .col-meta span {
  font-size: 0.75rem;
  padding: 2px 10px;
  background: var(--border);
  border-radius: 12px;
  color: var(--text-secondary);
}

/* Lesson Card Grid */
.lesson-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}
.lesson-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.15s, box-shadow 0.15s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.lesson-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  border-color: var(--accent-light);
}
.lesson-card .lesson-title {
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.4;
}
.lesson-card .lesson-subtitle {
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.4;
  flex: 1;
}
.lesson-card .lesson-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
  margin-top: 4px;
}
.lesson-card .lesson-meta .dur {
  font-size: 0.72rem;
  color: var(--accent);
  font-weight: 500;
}
.lesson-card .lesson-meta .tag {
  font-size: 0.7rem;
  padding: 1px 8px;
  background: var(--accent-subtle);
  border-radius: 8px;
  color: var(--text-secondary);
}

/* Footer */
.site-footer {
  margin-top: 60px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.85rem;
}

.workspace-topbar { font-size: 0.7rem; padding: 4px 16px; }

.workspace-topbar {
  background: rgba(204, 120, 92, 0.08);
  border-bottom: 1px solid var(--border);
  padding: 6px 24px;
  font-size: 0.8rem;
  text-align: center;
}
.workspace-topbar a {
  color: var(--accent);
  font-weight: 600;
  text-decoration: none;
}
.workspace-topbar a:hover { text-decoration: underline; color: var(--accent); }
.workspace-topbar .sep {
  color: var(--text-secondary);
  margin: 0 8px;
}
.workspace-topbar .current {
  color: var(--text-secondary);
}

@media (max-width: 640px) {
  .site-header h1 { font-size: 1.8rem; }
  .lesson-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="workspace-topbar">
  <a href="https://zhangs1r.github.io/lessonworkspace/">📚 LessonWorkspace</a>
  <span class="sep">/</span>
  <span class="current">ShiClass</span>
</div>

<div class="page">
  <header class="site-header">
    <h1>📖 施老师大课堂</h1>
    <p class="subtitle">施凌老师研讨会系列 · 30 节课程，从 Kalman Filter 理论到具身智能应用</p>
    <div class="meta">
      <span>🎯 30 节课程</span>
      <span>🎤 KF 系列</span>
      <span>🤖 特邀分享</span>
    </div>
  </header>

  <main id="mainContent">
    <!-- rendered by JS -->
  </main>

  <footer class="site-footer">
    <p>ShiClass · 施老师大课堂 · 视频/板书来源：江南大学云盘</p>
    <p style="margin-top:4px;font-size:0.8rem;">Powered by Hermes Agent · 每周三更新</p>
  </footer>
</div>

<script>
(function() {
  'use strict';
  const data = window.SHICLASS_DATA || { collections: [], lessons: [] };
  const main = document.getElementById('mainContent');

  // ---- Safe localStorage reader ----
  function lsGet(key, def) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch (e) { return def; }
  }

  // ---- Derive short lesson ID (same algorithm as lesson-tools.js) ----
  function shortId(str) {
    const d = str.match(/^(\d+)/);
    if (d) return d[1];
    const k = str.match(/^(KF-L\d+)/i);
    if (k) return k[1].toUpperCase();
    const e = str.match(/^([A-Za-z][A-Za-z0-9-]*)/);
    if (e) return e[1];
    return str;
  }

  // ---- Compute progress ----
  const doneSet = new Set(lsGet('shiclass_done', []));
  const totalLessons = data.lessons.length;
  let doneCount = 0;
  const colProgress = {};
  for (const lesson of data.lessons) {
    const sid = shortId(lesson.id || lesson.path || '');
    const isDone = doneSet.has(sid);
    if (isDone) doneCount++;
    const cid = lesson.collectionId || 'uncategorized';
    if (!colProgress[cid]) colProgress[cid] = { done: 0, total: 0 };
    colProgress[cid].total++;
    if (isDone) colProgress[cid].done++;
  }

  // ---- Progress bar HTML (10-character block bar, each = 10%) ----
  function renderProgress(done, total) {
    if (total === 0) return '';
    const pct = Math.round((done / total) * 100);
    const filled = Math.min(Math.round(pct / 10), 10);
    const bar = '\u2588'.repeat(filled) + '\u2591'.repeat(10 - filled);
    return '<div class="col-progress"><span class="col-bar">' + bar + '</span> <span class="col-progress-text">' + done + '/' + total + ' \u8282\u5df2\u5b66</span></div>';
  }

  // ---- Bookmark section for formulas / snippets ----
  function renderBookmarks(key, icon, titleText) {
    const items = lsGet(key, []);
    if (items.length === 0) return '';
    // Build lesson path lookup
    const pathMap = {};
    for (const l of data.lessons) {
      const sid = shortId(l.id || l.path || '');
      pathMap[sid] = l.path;
    }
    let html = '<section class="collection-section"><div class="collection-header"><h2>' + icon + ' \u6211\u7684' + titleText + '</h2></div><div class="bookmark-grid">';
    for (const item of items) {
      const lp = pathMap[item.lessonId];
      const link = lp ? ' href="' + escAttr(lp) + '"' : '';
      const time = item.timestamp ? new Date(item.timestamp).toLocaleString('zh-CN') : '';
      const content = escHtml(item.formula || item.code || '');
      const lang = item.language ? '<span class="bm-lang">[' + escHtml(item.language) + ']</span>' : '';
      const ctx = item.context ? '<span class="bm-ctx">\u2014 ' + escHtml(item.context) + '</span>' : '';
      html += '<div class="bookmark-card"><div class="bm-content">' + content + '</div>'
        + '<div class="bm-meta">'
        + (lang || ctx ? '<span class="bm-tags">' + lang + ctx + '</span>' : '<span></span>')
        + (link ? '<a' + link + '>\uD83D\uDCD6 \u67E5\u770B\u8BFE\u7A0B</a>' : '<span></span>')
        + '<span class="bm-time">' + time + '</span>'
        + '</div></div>';
    }
    html += '</div></section>';
    return html;
  }

  // ---- Escaping helpers ----
  function escHtml(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }
  function escAttr(str) {
    return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ---- Main render ----
  function render() {
    // Update hero stats
    const heroMeta = document.querySelector('.site-header .meta');
    if (heroMeta) {
      const firstSpan = heroMeta.querySelector('span:first-child');
      if (firstSpan) firstSpan.textContent = '\u2705 ' + doneCount + '/' + totalLessons + ' \u8282\u5df2\u5b66';
    }

    let html = '';

    // Group lessons by their collectionId
    const grouped = {};
    for (const lesson of data.lessons) {
      const cid = lesson.collectionId || 'uncategorized';
      if (!grouped[cid]) grouped[cid] = [];
      grouped[cid].push(lesson);
    }

    const orderedCollections = data.collections || [];

    for (const col of orderedCollections) {
      const lessons = grouped[col.id] || [];
      if (lessons.length === 0) continue;

      const prog = colProgress[col.id] || { done: 0, total: 0 };

      html += '<section class="collection-section">'
        + '<div class="collection-header">'
        + '<h2>' + (col.kind || '\u8bfe\u7a0b') + '\uff1a' + escHtml(col.title) + '</h2>'
        + renderProgress(prog.done, prog.total)
        + '<div class="col-desc">' + escHtml(col.description || '') + '</div>'
        + '<div class="col-meta">' + (col.meta||[]).map(function(m) { return '<span>' + escHtml(m) + '</span>'; }).join('') + '</div>'
        + '</div>'
        + '<div class="lesson-grid">';

      for (const lesson of lessons) {
        const tags = lesson.tags || [];
        html += '<a class="lesson-card" href="' + escAttr(lesson.path || '#') + '">'
          + '<div class="lesson-title">' + escHtml(lesson.title || '') + '</div>'
          + '<div class="lesson-subtitle">' + escHtml(lesson.subtitle || '') + '</div>'
          + '<div class="lesson-meta">'
          + '<span class="dur">' + escHtml(lesson.duration || '') + '</span>'
          + tags.slice(0,3).map(function(t) { return '<span class="tag">' + escHtml(t) + '</span>'; }).join('')
          + '</div>'
          + '</a>';
      }

      html += '</div></section>';
    }

    // Append bookmark sections
    html += renderBookmarks('shiclass_formulas', '\uD83D\uDCD0', '\u516c\u5f0f\u6536\u85cf');
    html += renderBookmarks('shiclass_snippets', '\uD83D\uDCBE', '\u4ee3\u7801\u6536\u85cf');

    main.innerHTML = html;
  }

  // Inject styles for progress bars & bookmark cards
  (function addStyles() {
    if (document.getElementById('scl-index-style')) return;
    const s = document.createElement('style');
    s.id = 'scl-index-style';
    s.textContent = '.col-progress{display:flex;align-items:center;gap:8px;margin:6px 0 4px}'
      + '.col-bar{font-size:1rem;letter-spacing:1px;color:var(--accent,#CC785C)}'
      + '.col-progress-text{font-size:0.8rem;color:var(--accent,#CC785C);font-weight:500}'
      + '.bookmark-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}'
      + '.bookmark-card{background:var(--card-bg,#fff);border:1px solid var(--border,#E8E4DC);border-radius:var(--radius,12px);padding:14px 16px;box-shadow:var(--shadow,0 2px 12px rgba(0,0,0,0.06))}'
      + '.bookmark-card .bm-content{font-family:\'JetBrains Mono\',monospace;font-size:0.85rem;line-height:1.5;word-break:break-all;margin-bottom:8px}'
      + '.bookmark-card .bm-meta{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:4px;font-size:0.78rem;color:var(--text-secondary,#888)}'
      + '.bookmark-card .bm-meta a{color:var(--accent,#CC785C);text-decoration:none;font-weight:500}'
      + '.bookmark-card .bm-meta a:hover{text-decoration:underline}'
      + '.bookmark-card .bm-lang{color:var(--accent-light,#E8A88C);font-weight:500}'
      + '.bookmark-card .bm-ctx{color:var(--text-secondary,#888)}'
      + '.bookmark-card .bm-time{font-size:0.72rem;color:#bbb}';
    document.head.appendChild(s);
  })();

  render();
})();
</script>
</body>
</html>
